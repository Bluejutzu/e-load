<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" fill="none" role="img" aria-label="Elektroauto lädt zuhause an der Wallbox">
  <defs>
    <linearGradient id="hSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13205c"/>
      <stop offset="0.55" stop-color="#1c34c4"/>
      <stop offset="1" stop-color="#2a52e0"/>
    </linearGradient>
    <linearGradient id="hCar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c4cfe6"/>
    </linearGradient>
    <linearGradient id="hGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a5bd0"/>
      <stop offset="1" stop-color="#16245f"/>
    </linearGradient>
    <radialGradient id="hGlow" cx="0.78" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#7be857" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7be857" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#hSky)"/>
  <rect width="1280" height="800" fill="url(#hGlow)"/>

  <!-- house -->
  <path d="M860 250 L1140 250 L1140 560 L860 560 Z" fill="#0f1840" opacity="0.92"/>
  <path d="M838 250 L1000 152 L1162 250 Z" fill="#1a2660"/>
  <rect x="900" y="320" width="84" height="120" rx="6" fill="#ffd27a" opacity="0.85"/>
  <rect x="1036" y="330" width="60" height="90" rx="6" fill="#ffd27a" opacity="0.55"/>

  <!-- ground -->
  <rect y="600" width="1280" height="200" fill="#0c1330"/>
  <g stroke="#1a2660" stroke-width="2" opacity="0.6">
    <path d="M120 668 H1160"/><path d="M60 724 H1220"/>
  </g>

  <!-- wallbox + cable to the car's charge port -->
  <g>
    <rect x="790" y="372" width="44" height="86" rx="9" fill="#0c1330"/>
    <rect x="790" y="372" width="44" height="86" rx="9" fill="none" stroke="#22306a" stroke-width="2"/>
    <circle cx="812" cy="396" r="6" fill="#7be857"/>
    <rect x="800" y="416" width="24" height="22" rx="4" fill="#22306a"/>
    <!-- cable curving down into the charge port on the car's rear flank -->
    <path d="M810 438 C 800 486, 772 520, 726 540" fill="none" stroke="#0c1330" stroke-width="11" stroke-linecap="round"/>
    <path d="M810 438 C 800 486, 772 520, 726 540" fill="none" stroke="#1a2660" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- car (side-view EV sedan) -->
  <g>
    <ellipse cx="450" cy="654" rx="330" ry="30" fill="#000" opacity="0.35"/>

    <!-- body -->
    <path d="M150 600
             L150 566
             C150 552 160 544 176 543
             L322 536
             L398 466
             C404 460 412 456 422 456
             L566 456
             C578 456 588 461 595 471
             L662 540
             L726 548
             C740 550 748 559 748 572
             L748 600 Z" fill="url(#hCar)"/>

    <!-- belt-line accent -->
    <path d="M180 560 L726 560" stroke="#2a52e0" stroke-width="3" opacity="0.25"/>

    <!-- greenhouse / windows (split by B-pillar) -->
    <path d="M338 532 L404 470 C408 466 414 463 421 463 L520 463 L520 532 Z" fill="url(#hGlass)" opacity="0.92"/>
    <path d="M540 463 L562 463 C572 463 580 467 586 475 L640 532 L540 532 Z" fill="url(#hGlass)" opacity="0.92"/>

    <!-- charge-port flap on the rear flank where the cable lands -->
    <rect x="700" y="528" width="30" height="26" rx="5" fill="#0c1330"/>
    <circle cx="715" cy="541" r="6" fill="#7be857"/>

    <!-- headlight -->
    <path d="M150 568 L172 566 L172 580 L150 582 Z" fill="#bcd7ff" opacity="0.85"/>

    <!-- wheels with arches -->
    <circle cx="320" cy="604" r="58" fill="#0c1330"/>
    <circle cx="320" cy="604" r="56" fill="none" stroke="#3a4775" stroke-width="3"/>
    <circle cx="320" cy="604" r="26" fill="#5b6788"/>
    <circle cx="600" cy="604" r="58" fill="#0c1330"/>
    <circle cx="600" cy="604" r="56" fill="none" stroke="#3a4775" stroke-width="3"/>
    <circle cx="600" cy="604" r="26" fill="#5b6788"/>
  </g>

  <!-- label -->
  <g transform="translate(64 64)">
    <rect width="190" height="44" rx="22" fill="#ffffff" opacity="0.12"/>
    <circle cx="26" cy="22" r="7" fill="#7be857"/>
    <text x="46" y="29" font-family="Outfit, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Zuhause laden</text>
  </g>
  <text x="64" y="744" font-family="Outfit, Arial, sans-serif" font-size="26" font-weight="800" fill="#ffffff">e&#8209;load <tspan fill="#7be857">me</tspan></text>
</svg>

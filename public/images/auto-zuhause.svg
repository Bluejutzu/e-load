<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" fill="none" role="img" aria-label="Elektroauto lädt zuhause an der Wallbox">
  <defs>
    <linearGradient id="hSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13205c"/>
      <stop offset="0.55" stop-color="#1c34c4"/>
      <stop offset="1" stop-color="#2a52e0"/>
    </linearGradient>
    <linearGradient id="hCar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c4cfe6"/>
    </linearGradient>
    <radialGradient id="hGlow" cx="0.78" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#7be857" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7be857" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#hSky)"/>
  <rect width="1280" height="800" fill="url(#hGlow)"/>

  <!-- house -->
  <path d="M770 250 L1060 250 L1060 560 L770 560 Z" fill="#0f1840" opacity="0.92"/>
  <path d="M745 250 L915 150 L1085 250 Z" fill="#1a2660"/>
  <rect x="812" y="320" width="84" height="120" rx="6" fill="#ffd27a" opacity="0.85"/>
  <rect x="952" y="330" width="60" height="90" rx="6" fill="#ffd27a" opacity="0.55"/>

  <!-- wallbox + cable -->
  <rect x="724" y="360" width="40" height="74" rx="8" fill="#0c1330"/>
  <circle cx="744" cy="380" r="5" fill="#7be857"/>
  <path d="M724 410 C 660 440, 640 470, 600 500" stroke="#0c1330" stroke-width="9" stroke-linecap="round"/>

  <!-- ground -->
  <rect y="560" width="1280" height="240" fill="#0c1330"/>
  <g stroke="#1a2660" stroke-width="2" opacity="0.6">
    <path d="M120 640 H1160"/><path d="M60 700 H1220"/>
  </g>

  <!-- car -->
  <g>
    <ellipse cx="430" cy="600" rx="320" ry="34" fill="#000" opacity="0.35"/>
    <path d="M180 560 C 240 470, 320 452, 430 452 C 540 452, 620 478, 690 540 L 700 588 C 700 600, 690 606, 678 606 L 196 606 C 184 606, 174 600, 174 588 Z" fill="url(#hCar)"/>
    <path d="M300 470 C 360 458, 500 458, 580 488 L 612 538 L 268 538 Z" fill="#2a52e0" opacity="0.30"/>
    <circle cx="300" cy="600" r="52" fill="#0c1330"/><circle cx="300" cy="600" r="26" fill="#5b6788"/>
    <circle cx="582" cy="600" r="52" fill="#0c1330"/><circle cx="582" cy="600" r="26" fill="#5b6788"/>
  </g>

  <!-- label -->
  <g transform="translate(64 64)">
    <rect width="190" height="44" rx="22" fill="#ffffff" opacity="0.12"/>
    <circle cx="26" cy="22" r="7" fill="#7be857"/>
    <text x="46" y="29" font-family="Outfit, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Zuhause laden</text>
  </g>
  <text x="64" y="744" font-family="Outfit, Arial, sans-serif" font-size="26" font-weight="800" fill="#ffffff">e&#8209;load <tspan fill="#7be857">me</tspan></text>
</svg>
